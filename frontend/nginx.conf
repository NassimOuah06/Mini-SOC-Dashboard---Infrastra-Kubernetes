server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Important pour React Router : redirige les 404 vers index.html
        try_files $uri $uri/ /index.html;
    }

    # Optimisation : Cache pour les fichiers statiques
    location /static/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public";
    }
}